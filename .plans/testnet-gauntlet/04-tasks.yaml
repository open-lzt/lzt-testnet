- id: T5
  title: "FaultInjectionMiddleware (pure-ASGI) + wire into create_app + Settings chaos fields (D2)"
  files: ["src/lzt_testnet/chaos/middleware.py", "src/lzt_testnet/config.py", "src/lzt_testnet/api/app.py", "src/lzt_testnet/api/dependencies.py", "tests/chaos/test_middleware.py"]
  depends_on: [T3, T4]
  parallelizable: false
  acceptance: "With CHAOS_MODE=off and no X-Chaos header, a real request is byte-identical to pre-change
    (fast-path). X-Chaos:http_502_nginx@* on any route -> 502 nginx HTML through the middleware. Same
    (seed,mode=hostile) over a fixed request script injects an identical fault sequence twice. connection_drop
    closes the ASGI connection without a full body. pytest tests/chaos/test_middleware.py green."
  est_loc: 240


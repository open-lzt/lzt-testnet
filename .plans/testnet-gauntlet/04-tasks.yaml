# testnet Gauntlet — task DAG (layered). Every task carries its own tests in `acceptance`
# ("каждый шаг покрыт тестами"). est_loc includes the task's tests. Parallel tasks have disjoint files.

- id: T1
  title: "Seed engine — SeedController (rng streams, next_id, next_seq, seed_generation)"
  files: ["src/lzt_testnet/chaos/__init__.py", "src/lzt_testnet/chaos/seed.py", "tests/chaos/test_seed.py"]
  depends_on: []
  parallelizable: true
  acceptance: "test_seed proves: same seed -> stream(seq) yields identical draws across two SeedController
    instances; next_id(LOT) is monotonic and seed-scoped (independent of process history); next_seq monotonic.
    ruff+mypy clean; pytest tests/chaos/test_seed.py green."
  est_loc: 160

- id: T2
  title: "Fault taxonomy + profiles (FaultKind/Fault/FaultContext, Intensity, ChaosProfile, 4 built-ins)"
  files: ["src/lzt_testnet/chaos/faults.py", "src/lzt_testnet/chaos/profiles.py", "tests/chaos/test_profiles.py"]
  depends_on: []
  parallelizable: true
  acceptance: "PRE_RESPONSE/POST_RESPONSE/DOMAIN frozensets partition FaultKind (test asserts no overlap,
    full cover). profile_for(OFF) is None; profile_for(HOSTILE) rolls a fault deterministically under a
    fixed rng. pytest tests/chaos/test_profiles.py green; mypy strict clean (no literals — enum only)."
  est_loc: 150

